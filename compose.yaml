services:
  postgres:
    image: postgres:17
    container_name: event-postgres
    environment:
      POSTGRES_DB: event
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/spec/features/attendance-check/event-platform-schema-draft.sql:/docker-entrypoint-initdb.d/01-event-schema.sql:ro
      - ./docker/postgres/init/02-local-seed.sql:/docker-entrypoint-initdb.d/02-local-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
